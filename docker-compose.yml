services:
  db:
    image: postgres:15
    container_name: slaw-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slaw_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:latest
    container_name: slaw-chroma
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    container_name: slaw-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  llm-guard:
    image: laiyer/llm-guard-api:latest
    container_name: slaw-llm-guard
    profiles:
      - security
    ports:
      - "127.0.0.1:8002:8000"
    environment:
      AUTH_TOKEN: ${LLM_GUARD_API_TOKEN:-}
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      LAZY_LOAD: "true"
      SCAN_FAIL_FAST: "true"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_LIMIT: 60/minute
    entrypoint:
      - /home/user/app/entrypoint.sh
    volumes:
      - ./llm-guard/entrypoint.sh:/home/user/app/entrypoint.sh:ro
      - ./llm-guard/scanners.yml:/home/user/app/config/scanners.yml:ro

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
